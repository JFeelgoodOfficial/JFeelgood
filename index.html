<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JFeelgood Art</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="The art of JFeelgood – paintings, series, and books born from 20 years of creative self-work.">
  <style>
    :root {
      --bg: #050509;
      --bg-alt: #0b0b12;
      --accent: #f5b642;
      --accent-soft: #f5e1b8;
      --text: #f7f7f7;
      --text-muted: #b1b1c7;
      --border: #262637;
      --card: #11111a;
      --highlight: #f25e7a;
      --link: #f5b642;
      --link-hover: #ffe2a0;
      --shadow-soft: 0 18px 40px rgba(0,0,0,0.55);
      --radius-lg: 18px;
      --radius-full: 999px;
      --transition-fast: 0.18s ease-out;
      --max-width: 1080px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      background: radial-gradient(circle at top, #141427 0, #050509 60%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      line-height: 1.6;
      scroll-behavior: smooth;
    }

    body {
      padding: 24px 16px 48px;
      display: flex;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: var(--max-width);
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      color: var(--link-hover);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo {
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 0.88rem;
      color: var(--accent-soft);
    }

    nav {
      display: flex;
      gap: 16px;
      font-size: 0.9rem;
    }

    nav a {
      color: var(--text-muted);
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid transparent;
      transition: background var(--transition-fast), border-color var(--transition-fast),
        color var(--transition-fast), transform var(--transition-fast);
    }

    nav a:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(245,182,66,0.2);
      color: var(--text);
      transform: translateY(-1px);
    }

    main {
      display: flex;
      flex-direction: column;
      gap: 36px;
    }

    section {
      background: radial-gradient(circle at top left, #1b1b2f 0, #070711 55%);
      border-radius: var(--radius-lg);
      padding: 24px 22px 22px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      position: relative;
      overflow: hidden;
    }

    section + section {
      margin-top: 4px;
    }

    section::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at top right,
        rgba(245,182,66,0.16) 0,
        transparent 55%);
      opacity: 0.75;
    }

    .section-inner {
      position: relative;
      z-index: 1;
    }

    h1, h2, h3 {
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-size: 0.82rem;
      color: var(--accent-soft);
      margin-bottom: 10px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 3fr) minmax(0, 2.4fr);
      gap: 22px;
      align-items: center;
    }

    .hero-title {
      font-size: clamp(1.85rem, 4vw, 2.4rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .hero-sub {
      color: var(--text-muted);
      font-size: 0.98rem;
      max-width: 34rem;
      margin-bottom: 14px;
    }

    .hero-quote {
      font-size: 0.95rem;
      color: var(--accent-soft);
      border-left: 3px solid rgba(245,182,66,0.5);
      padding-left: 12px;
      margin-bottom: 16px;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .chip {
      border-radius: var(--radius-full);
      border: 1px solid rgba(177,177,199,0.5);
      font-size: 0.73rem;
      padding: 4px 9px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      background: rgba(8,8,16,0.9);
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 6px;
    }
